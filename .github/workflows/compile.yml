name: Compile Beamer Slides & Deploy Hub
on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Compile LaTeX Beamer Presentation
        uses: xu-cheng/latex-action@v3
        with:
          root_file: Astrodynamics_Content.tex  # 1. Tells the compiler your new file name
          compiler: pdflatex

      - name: Stage Deployment Directory
        run: |
          mkdir -p public
          mv *.pdf public/index.pdf
          # UPDATE THIS LINE: Now copies both html and png files
          cp *.{html,png} public/ 2>/dev/null || true

      - name: Setup Pages Configuration
        uses: actions/configure-pages@v5

      - name: Upload Production Assets Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy Directly to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4