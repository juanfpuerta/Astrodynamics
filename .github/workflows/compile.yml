name: Compile Beamer Slides & Deploy Hub
on:
  push:
    branches:
      - main  # Triggers when you push to your main branch

# Explicitly grant the native deployment privileges required by GitHub
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Compile LaTeX Beamer Presentation
        uses: xu-cheng/latex-action@v3
        with:
          root_file: Astrodynamics_Content.tex
          compiler: pdflatex

      - name: Stage Deployment Directory
        run: |
          mkdir -p public
          # Move your compiled presentation to the index target
          mv main.pdf public/index.pdf
          # Safely copy any uploaded HTML interactive tools into the directory
          cp *.html public/ 2>/dev/null || true

      - name: Setup Pages Configuration
        uses: actions/configure-pages@v5

      - name: Upload Production Assets Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy Directly to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4